<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>masmavi fotografie</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="logo">masmavi</div>
  <nav class="menu">
    <a href="#portfolio">Portfolio</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-inner">
    <h1>Fotografie</h1>
    <p>Was zählt, ist Begeisterung.</p>
  </div>
</section>

<section id="portfolio" class="section">
  <h2>Portfolio</h2>
  <div class="grid">
    <img src="bilder/foto1.jpg">
    <img src="bilder/foto2.jpg">
    <img src="bilder/foto3.jpg">
    <img src="bilder/foto4.jpg">
    <img src="bilder/foto5.jpg">
    <img src="bilder/foto6.jpg">
    <img src="bilder/foto7.jpg">
    <img src="bilder/foto8.jpg">
  </div>
</section>

<section id="about" class="section light">
  <h2>About</h2>
  <p>
    Masmavi ist ein fotografisches Projekt zwischen Stille, Emotion und visueller Poesie.
    Der Fokus liegt auf natürlichen Momenten, feinen Details und ruhigen Kompositionen.
  </p>
</section>

<section id="contact" class="section">
  <h2>Contact</h2>
  <form action="https://formspree.io/f/DEINCODE" method="POST">
    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="E-Mail" required>
    <textarea name="message" placeholder="Nachricht" required></textarea>
    <button type="submit">Nachricht senden</button>
  </form>
</section>

<footer>
  © 2026 Masmavi Photography
</footer>

<script src="script.js"></script>
</body>
</html>
